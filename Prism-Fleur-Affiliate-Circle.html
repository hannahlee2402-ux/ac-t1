  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 'Jost', sans-serif; box-shadow: 0 24px 60px rgba(44,33,24,0.16);\">\n\n  <!-- HEADER -->\n  <div style=\"display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 18px; border-bottom: 1.5px solid #2C2118;\">\n    <div style=\"font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 32px; letter-spacing: 0.5px; color: #2C2118; line-height: 1;\">Prism + Fleur<\u002Fdiv>\n    <div style=\"font-weight: 600; font-size: 14px; letter-spacing: 3px; color: #9C8E79; line-height: 1;\">AFFILIATE CIRCLE<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- DISCOUNT CODE OVER RITUAL IMAGE -->\n  <div style=\"position: relative; overflow: hidden; border-bottom: 1px solid #DBD1C1; margin: 0 -64px;\">\n    <img src=\"e5b008d2-40b8-4cfd-9e8f-1bc7fe26a474\" alt=\"A calm oracle ritual with Prism + Fleur\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 34%; opacity: 0.9;\">\n    <div style=\"position: absolute; inset: 0; background: linear-gradient(180deg, rgba(245,240,231,0.62) 0%, rgba(245,240,231,0.4) 50%, rgba(245,240,231,0.66) 100%);\"><\u002Fdiv>\n    <div style=\"position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 14px; padding: 58px 64px 56px;\">\n      <div style=\"font-weight: 600; font-size: 11.5px; letter-spacing: 3px; color: #8A7A5F; text-transform: uppercase;\">Your Personal Discount Code<\u002Fdiv>\n      <div style=\"font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 48px; letter-spacing: 1px; color: #2C2118; line-height: 1;\">AFFILIATECIRCLE25<\u002Fdiv>\n      <div style=\"font-size: 13px; color: #6E6047; line-height: 1.6; white-space: nowrap;\">This is your personal code to use on our website — shop anything from the Prism + Fleur collection.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- WHAT WE'RE LOOKING FOR -->\n  <div style=\"padding: 44px 0; border-bottom: 1px solid #DBD1C1;\">\n    <div style=\"font-weight: 600; font-size: 11.5px; letter-spacing: 2.5px; color: #9C8E79; text-transform: uppercase; margin-bottom: 20px;\">What We're Looking For<\u002Fdiv>\n    <div style=\"display: flex; flex-direction: column; gap: 18px; font-size: 15px; line-height: 1.75; color: #5A4C3D;\">\n      <div>We'd love for our tarot and oracle decks to be featured naturally within your content — woven into your posts, Reels, or Stories in a way that feels genuine to you and your community.<\u002Fdiv>\n      <div>In terms of deliverables, we're looking for:<\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n        <div style=\"display: flex; gap: 16px; align-items: baseline;\"><span style=\"color: #B7A88F; flex: none;\">—<\u002Fspan><span>1 Story set (3–5 frames) showing the product in use, with your affiliate code and @prism.and.fleur tagged<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: baseline;\"><span style=\"color: #B7A88F; flex: none;\">—<\u002Fspan><span>1 Reel (15–30 seconds) featuring the product, with your affiliate code in the caption and @prism.and.fleur tagged<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: baseline;\"><span style=\"color: #B7A88F; flex: none;\">—<\u002Fspan><span>All content delivered within 3 weeks of receiving your items<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HOW WE WANT IT TO FEEL -->\n  <div style=\"padding: 44px 0; border-bottom: 1px solid #DBD1C1;\">\n    <div style=\"font-weight: 600; font-size: 11.5px; letter-spacing: 2.5px; color: #9C8E79; text-transform: uppercase; margin-bottom: 20px;\">How We Want It To Feel<\u002Fdiv>\n    <div style=\"display: flex; flex-direction: column; gap: 18px; font-size: 15px; line-height: 1.75; color: #5A4C3D;\">\n      <div style=\"font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 23px; line-height: 1.35; color: #2C2118;\">We're not asking you to “sell” this deck, or persuade people that it's for them.<\u002Fdiv>\n      <div>We're asking you to share what it actually feels like to own it and use it.<\u002Fdiv>\n      <div style=\"font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 20px; line-height: 1.35; color: #2C2118; margin-top: 6px;\">Think of it like this:<\u002Fdiv>\n      <div>You're not talking to the internet. You're talking to one person who might need this in their life — your friend, someone who's listening to you.<\u002Fdiv>\n      <div>We're looking for content that feels:<\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n        <div style=\"display: flex; gap: 16px; align-items: baseline;\"><span style=\"color: #B7A88F; flex: none;\">—<\u002Fspan><span>Real, not rehearsed<\u002Fspan><\u002Fdiv>\n        <div style=\"display: flex; gap: 16px; align-items: baseline;\"><span style=\"color: #B7A88F; flex: none;\">—<\u002Fspan><span>Calm, honest and grounded<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 23px; line-height: 1.35; color: #2C2118; margin-top: 6px;\">If it feels calm to make, it will feel calm to watch.<\u002Fdiv>\n      <div>Bring your own voice and style to it — that's exactly what we want to see.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- REFERENCE EXAMPLES -->\n  <div style=\"padding: 44px 0 4px;\">\n    <div style=\"display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px;\">\n      <div style=\"font-weight: 600; font-size: 11.5px; letter-spacing: 2.5px; color: #9C8E79; text-transform: uppercase;\">Reference Examples<\u002Fdiv>\n      <div style=\"font-weight: 500; font-size: 10.5px; letter-spacing: 2.5px; color: #B7A88F; text-transform: uppercase;\">Video Content<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size: 15px; line-height: 1.75; color: #5A4C3D; margin-bottom: 34px; max-width: 620px;\">Click the links below for inspiration — feel free to use these as a reference or simply to get a feel for the kind of content we love:<\u002Fdiv>\n\n    <div style=\"display: flex; justify-content: space-between; gap: 16px;\">\n      <sc-for list=\"{{ reels }}\" as=\"reel\" hint-placeholder-count=\"5\">\n        <div style=\"display: flex; flex-direction: column; align-items: center; gap: 12px; width: 120px;\">\n          <div style=\"position: relative; box-sizing: border-box; width: 120px; height: 246px; padding: 5px; background: #2C2118; border-radius: 26px; box-shadow: 0 10px 22px rgba(44,33,24,0.18);\">\n          <img src=\"{{ reel.thumb }}\" alt=\"{{ reel.type }} reference\" style=\"display: block; width: 100%; height: 100%; object-fit: cover; border-radius: 21px;\">\n            <a href=\"{{ reel.url }}\" target=\"_blank\" rel=\"noopener\" title=\"View on Instagram\" style=\"position: absolute; inset: 5px; display: flex; align-items: center; justify-content: center; z-index: 4; text-decoration: none; border-radius: 21px;\">\n              <span style=\"width: 46px; height: 46px; border-radius: 50%; background: rgba(245,240,231,0.92); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 14px rgba(44,33,24,0.3); transition: transform 0.15s ease;\">\n                <span style=\"width: 0; height: 0; border-left: 14px solid #2C2118; border-top: 9px solid transparent; border-bottom: 9px solid transparent; margin-left: 3px;\"><\u002Fspan>\n              <\u002Fspan>\n            <\u002Fa><\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; align-items: center; gap: 4px;\">\n            <div style=\"font-weight: 600; font-size: 10px; letter-spacing: 2px; color: #9C8E79; text-transform: uppercase;\">{{ reel.type }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top: 44px; border-bottom: 1.5px solid #2C2118;\"><\u002F
